name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
    # 1. 깃허브 서버로 내 코드를 다운받아오는 기본 액션
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Secret Scanning (GitLeaks) - 가짜 키 적발 완료!
    # GitLeaks의 두 가지 얼굴 (Token의 유무)
    # 1. 토큰이 있을 때 (Protect 모드: 역사학자)
  
    # 역할: 깃허브 서버(API)에 직접 통신을 걸어서, 이 프로젝트의 과거부터 현재까지의 모든 커밋(Commit) 기록을 통째로 가져와 뒤져봅니다.
  
    # 토큰의 용도: 깃허브 서버에게 "나 이 레포지토리 역사 좀 열람할게!"라고 권한을 증명하는 신분증(API Key) 역할을 합니다. 그래서 GITHUB_TOKEN을 쥐여주었을 때는 권한이 생겨서 깐깐하게 과거의 가짜 키 흔적까지 다 파헤쳤던 것입니다.

    # 2. 토큰이 없을 때 (Detect 모드: 현장 요원)

    # 역할: 깃허브 서버와 통신하지 않고, 방금 내 컴퓨터(Actions 러너)에 다운로드된 현재 파일들만 쓱 훑어보고 끝냅니다.

    # 토큰의 용도: 내 로컬 하드디스크에 있는 텍스트 파일을 읽는 데는 인터넷 통신이나 깃허브 신분증이 필요 없죠? 우리가 파이프라인의 1번 스텝(actions/checkout)에서 이미 최신 코드를 러너 서버로 다운받아 두었기 때문에, GitLeaks는 그냥 그 파일만 텍스트 읽듯이 읽고 "지금 코드에는 키가 없네!" 하고 통과시켜 주는 것입니다.
    - name: Run GitLeaks (Secret Scanning)
      uses: gitleaks/gitleaks-action@v2

    # 3. 파이썬 환경 세팅
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # 4. Advanced SAST (Semgrep) - 기존 Bandit을 완벽하게 대체하는 1티어 툴
    - name: Run Semgrep (SAST)
      uses: returntocorp/semgrep-action@v1
      with:
        config: "p/python"

    # 5. IaC Scanning (Checkov) - 인프라(Dockerfile) 보안 검사 요원 투입
    - name: Run Checkov (IaC Scanning)
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        framework: dockerfile

    # 6. 도커 이미지 빌드
    - name: Build Docker Image
      run: docker build -t my-secure-app:latest .

    # 7. SCA / Container Scanning (Trivy) - 라이브러리 검사
    - name: Run Trivy vulnerability scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: my-secure-app:latest
        format: table
        exit-code: 1
        ignore-unfixed: true
        vuln-type: library
        severity: CRITICAL

    # 8. DAST 대상 서버 기동 - ZAP이 공격할 수 있도록 컨테이너를 실제로 띄움
    - name: Run Container for DAST Target
      run: |
        docker run -d --name dast-target -p 8000:8000 my-secure-app:latest
        timeout 60 bash -c 'until curl -sf http://localhost:8000/; do sleep 2; done'

    # 9. DAST (OWASP ZAP) - 살아있는 서버를 대상으로 실제 웹 모의 해킹(패시브 탐지) 수행
    # Phase 1.2 첫 도입 단계: 리포트만 남기고 파이프라인은 통과시킴 (fail_action: false)
    - name: Run OWASP ZAP Baseline Scan (DAST)
      uses: zaproxy/action-baseline@v0.12.0
      with:
        target: 'http://localhost:8000'
        fail_action: false